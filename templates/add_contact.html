<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Contact</title>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea, #764ba2);
            --card-bg: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.3);
            --blur: blur(18px);
            --text-light: #ffffff;
            --text-muted: #dcdcdc;
            --accent: #00e6a8;
            --danger: #ff6b6b;
        }

        * {
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-light);
        }

        /* COVER */
        .cover {
            width: 100%;
            padding: 20px;
        }

        /* MAIN CARD */
        .maindiv {
            max-width: 420px;
            margin: auto;
            padding: 28px;
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* TITLE */
        .maindiv::before {
            content: "➕ Add Contact";
            display: block;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 22px;
            letter-spacing: 1px;
        }

        /* FORM */
        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* INPUTS */
        input[type="text"],
        input[type="tel"] {
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-light);
            font-size: 15px;
            outline: none;
            transition: all 0.25s ease;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 3px rgba(0, 230, 168, 0.25);
        }

        /* SUBMIT BUTTON */
        input[type="submit"] {
            margin-top: 10px;
            padding: 14px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #00e6a8, #00c896);
            color: #003b2f;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 12px 25px rgba(0,0,0,0.35);
        }

        input[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 35px rgba(0,0,0,0.45);
        }

        input[type="submit"]:active {
            transform: scale(0.97);
        }

        /* MOBILE POLISH */
        @media (max-width: 480px) {
            .maindiv {
                padding: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="cover">
        <div class="maindiv">
            <form action="{{ url_for('contacts.add_contact') }}" method="post">
                <input type="text" name="name" placeholder="Enter name" required>
                <input type="tel" name="phone" placeholder="Enter mobile number" required>
                <input type="submit" value="Submit">
            </form>
        </div>
    </div>
</body>
</html>
