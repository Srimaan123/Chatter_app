<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>

    <style>
        :root {
            --bg: linear-gradient(135deg, #667eea, #764ba2);
            --glass: rgba(255,255,255,0.12);
            --border: rgba(255,255,255,0.25);
            --text: #ffffff;
            --muted: #dcdcdc;
            --sender: #00e6a8;
            --receiver: rgba(255,255,255,0.25);
        }

        * {
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
        }

        .cover {
            width: 95%;
            max-width: 480px;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
        }

        /* HEADER */
        .header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .header h2 {
            margin: 0;
            font-size: 18px;
        }

        .header button {
            background: #ff6b6b;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        /* CHAT BOX */
        .chat_box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sender_chat,
        .receiver_chat {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .sender_chat {
            align-self: flex-end;
            background: var(--sender);
            color: #003b2f;
            border-bottom-right-radius: 4px;
        }

        .receiver_chat {
            align-self: flex-start;
            background: var(--receiver);
            border-bottom-left-radius: 4px;
        }

        /* INPUT AREA */
        .navbar {
            padding: 12px;
            border-top: 1px solid var(--border);
        }

        .navbar form {
            display: flex;
            gap: 10px;
        }

        .navbar input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 14px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .navbar button {
            padding: 10px 16px;
            border-radius: 14px;
            border: none;
            background: #00e6a8;
            color: #003b2f;
            font-weight: 600;
            cursor: pointer;
        }

        .navbar button:hover {
            transform: scale(1.05);
        }

    </style>
</head>

<body>

<div class="cover">

    <!-- HEADER -->
    <div class="header">
        <h2>💬 Chat</h2>
        <button onclick="exitChat()">Exit🚪</button>
    </div>

    <!-- CHAT MESSAGES -->
    <div class="chat_box">

        {% if chats %}
            {% for chat in chats %}
                {% if chat[1] == user_id %}
                    <div class="sender_chat">
                        {{ chat[3] }}
                    </div>
                {% else %}
                    <div class="receiver_chat">
                        {{ chat[3] }}
                    </div>
                {% endif %}
            {% endfor %}
        {% else %}
            <p style="text-align:center; color: var(--muted);">
                No messages yet. Start the conversation 🚀
            </p>
        {% endif %}

    </div>

    <!-- MESSAGE INPUT -->
    <div class="navbar">
        <input type="text" id="msg" placeholder="Type your message...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
    const socket = io();
    
    // join room
    socket.emit("join_chat", {
        user_id: {{ user_id }},
        reciever_id: {{ reciever_id }}
    });
    
    // send message
    function sendMessage() {
        let input = document.querySelector("#msg");
        let msg = input.value;
    
        if (msg === "") return;
    
        // show instantly
        addMessage("You", msg);
    
        socket.emit("send_message", {
            user_id: {{ user_id }},
            reciever_id: {{ reciever_id }},
            message: msg
        });
    
        input.value = "";
    }
    
    // receive message
    socket.on("receive_message", function(data) {
        if (data.user_id == {{ user_id }}) return;
    
        addMessage("Other", data.message);
    });
    
    // UI
    function addMessage(sender, msg) {
        let div = document.createElement("div");
    
        if (sender === "You") {
            div.className = "sender_chat";
        } else {
            div.className = "receiver_chat";
        }
    
        div.innerText = msg;
    
        document.querySelector(".chat_box").appendChild(div);
    }
    function exitChat(){
        socket.disconnect();
        window.location.href = "{{ url_for('contacts.contacts')}}";
    }
</script>
</body>
</html>
