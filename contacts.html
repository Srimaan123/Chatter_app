<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea, #764ba2);
            --card-bg: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.25);
            --blur: blur(16px);
            --text-light: #f9f9f9;
            --text-muted: #d6d6d6;
            --accent: #00e6a8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, sans-serif;
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-light);
        }

        /* MAIN CARD */
        .maindiv {
            width: 90%;
            max-width: 480px;
            padding: 24px;
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .header a {
            text-decoration: none;
            font-size: 14px;
            color: var(--accent);
            font-weight: 600;
        }

        /* CONTACT LIST */
        .contacts {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        form {
            margin: 0;
        }

        .contact {
            padding: 14px 16px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .contact:hover {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.28);
        }

        .contact p {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .contact span {
            font-size: 13px;
            color: var(--text-muted);
        }

        .empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
            padding: 20px 0;
        }

        /* FLOATING ADD BUTTON */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00e6a8, #00c896);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 34px;
            color: #ffffff;
            text-decoration: none;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.35);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            z-index: 1000;
        }

        .fab:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.45);
        }
    </style>
</head>

<body>

    <div class="maindiv">

        <div class="header">
            <h1>📇 Contacts</h1>
            <a href="{{ url_for('auth.login') }}">← Login</a>
        </div>

        <div class="contacts">
            {% for contact in contacts %}
            <form action="{{ url_for('contacts.contacts') }}" method="post">
                <div class="contact">
                    <div>
                        <p>{{ contact[2] }}</p>
                        <span>{{ contact[2] }}</span>
                    </div>
                    <span>›</span>
                    <input type="hidden" name="phone" value="{{ contact[3] }}">
                </div>
            </form>
            {% else %}
            <p class="empty">No contacts yet. Add some 📭</p>
            {% endfor %}
        </div>

    </div>

    <!-- FLOATING PLUS BUTTON -->
    <a href="{{ url_for('contacts.add_contact') }}" class="fab" title="Add Contact">
        +
    </a>
    <script>
        let allForms = document.querySelectorAll("form");
        
        allForms.forEach(form=>{
            form.querySelector(".contact").addEventListener("click",()=>{
                form.submit();
            })
        })
    </script>
</body>
</html>
